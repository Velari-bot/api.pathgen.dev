<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathGen | Free Replay Parser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #22d3ee;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .upload-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .upload-card:hover {
            transform: translateY(-5px);
        }

        .drop-zone {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .drop-zone.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .drop-zone i {
            display: block;
            font-size: 40px;
            margin-bottom: 15px;
            color: var(--primary);
        }

        #file-input {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loader-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #results {
            display: none;
            margin-top: 40px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            padding: 20px;
            overflow: hidden;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        .results-header h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
        }

        #json-output {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #e2e8f0;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 500px;
            overflow-y: auto;
        }

        .field-key { color: var(--accent); }
        .field-string { color: #facc15; }
        .field-number { color: #f472b6; }
        .field-bool { color: #4ade80; }

        footer {
            margin-top: auto;
            padding: 40px 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .badge {
            background: rgba(34, 211, 238, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            vertical-align: middle;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>PathGen <span class="badge">FREE LIVE TIER</span></h1>
            <p class="subtitle">Upload a Fortnite .replay file to see dynamic bitstream parsing results.</p>
        </header>

        <div class="upload-card">
            <div class="drop-zone" id="drop-zone">
                <i>📁</i>
                <div id="drop-zone-text">Click or drag replay file here</div>
                <input type="file" id="file-input" accept=".replay">
            </div>

            <button class="btn" id="parse-btn" disabled>Parse Replay</button>

            <div class="loader" id="loader">
                <div class="loader-spinner"></div>
                <div style="margin-top: 10px; font-size: 0.9rem; color: var(--text-muted);">Decrypting bitstream sectors...</div>
            </div>
        </div>

        <div id="results">
            <div class="results-header">
                <h2>Parsed JSON Output</h2>
                <button onclick="copyJson()" style="background: none; border: 1px solid var(--glass-border); color: white; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;">Copy JSON</button>
            </div>
            <pre id="json-output"></pre>
        </div>
    </div>

    <footer>
        &copy; 2026 PathGen Commercial Analytics. All Rights Reserved.
    </footer>

    <script>
        const fileInput = document.getElementById('file-input');
        const parseBtn = document.getElementById('parse-btn');
        const dropZone = document.getElementById('drop-zone');
        const dropZoneText = document.getElementById('drop-zone-text');
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        const jsonOutput = document.getElementById('json-output');

        let selectedFile = null;

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                dropZoneText.innerText = file.name;
                parseBtn.disabled = false;
                dropZone.classList.add('active');
            }
        });

        parseBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // Reset UI
            parseBtn.style.display = 'none';
            loader.style.display = 'block';
            results.style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                // Pointing to the live tier we just made public
                const res = await fetch('http://localhost:3000/v1/tier/free', {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) throw new Error('Parsing failed. Replay may be corrupted.');

                const data = await res.json();
                
                // Format and show JSON
                jsonOutput.innerHTML = syntaxHighlight(JSON.stringify(data.data, null, 4));
                results.style.display = 'block';
            } catch (err) {
                alert(err.message);
            } finally {
                loader.style.display = 'none';
                parseBtn.style.display = 'block';
            }
        });

        function syntaxHighlight(json) {
            if (typeof json != 'string') {
                json = JSON.stringify(json, undefined, 2);
            }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                var cls = 'field-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'field-key';
                    } else {
                        cls = 'field-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'field-bool';
                } else if (/null/.test(match)) {
                    cls = 'field-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        function copyJson() {
            const text = jsonOutput.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = originalText, 2000);
            });
        }
    </script>
</body>
</html>
